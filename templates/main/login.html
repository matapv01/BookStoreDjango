{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}Đăng nhập - {{ settings.site_name }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">Đăng nhập</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Đăng nhập</button>
                        </div>
                    </form>
                    <hr>
                    <p class="text-center mb-0">
                        Chưa có tài khoản? 
                        <a href="{% url 'main:register' %}">Đăng ký ngay</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
