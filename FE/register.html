<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f2f2f2;
        }

        .register-form-container {
            background-color: #fff;
            padding: 20px 30px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        .register-form-container form h3 {
            margin-bottom: 15px;
            color: #333;
            text-align: center;
        }

        .register-form-container form .box {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .register-form-container form .btn {
            width: 100%;
            padding: 10px;
            border: none;
            background-color: #5cb85c;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
        }

        .register-form-container form .btn:hover {
            background-color: #4cae4c;
        }

        .register-form-container form p {
            text-align: center;
            margin-top: 20px;
        }

        .register-form-container form p a {
            color: #5cb85c;
            text-decoration: none;
        }

        .register-form-container form p a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="register-form-container">
        <form action="/register" method="post">
            <h3>Register Now</h3>
            <input type="text" name="name" placeholder="Enter your name" required class="box">
            <input type="email" name="email" placeholder="Enter your email" required class="box">
            <input type="password" name="password" placeholder="Enter your password" required class="box">
            <input type="password" name="cpassword" placeholder="Confirm your password" required class="box">
            <select name="user_type" class="box">
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
            <input type="submit" name="submit" value="Register Now" class="btn">
            <p>Already have an account? <a href="login.html">Login now</a></p>
        </form>
    </div>
</body>
</html>
