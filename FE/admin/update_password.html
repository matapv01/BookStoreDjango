    <section class="update-password" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #f5f5f5;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-12 col-md-12 col-sm-10">
                    <div class="form-container" style="padding: 3rem; background-color: #fff; border-radius: .5rem; box-shadow: 0 .5rem 1rem rgba(0,0,0,.1); text-align: center;">

                        <form action="" method="post" style="display: flex; flex-direction: column; align-items: center;">
                            <input type="password" name="old_password" placeholder="Nhập mật khẩu cũ" required class="box" style="width: 100%; max-width: 400px; margin: 1rem 0; padding: 1.2rem 1.4rem; font-size: 1.8rem; border-radius: .5rem; border: .1rem solid #333;">
                            <input type="password" name="new_password" placeholder="Nhập mật khẩu mới" required class="box" style="width: 100%; max-width: 400px; margin: 1rem 0; padding: 1.2rem 1.4rem; font-size: 1.8rem; border-radius: .5rem; border: .1rem solid #333;">
                            <input type="password" name="confirm_password" placeholder="Xác nhận mật khẩu mới" required class="box" style="width: 100%; max-width: 400px; margin: 1rem 0; padding: 1.2rem 1.4rem; font-size: 1.8rem; border-radius: .5rem; border: .1rem solid #333;">
                            <input type="submit" value="Cập nhật" class="btn" style="width: 100%; max-width: 400px; margin-top: 1.5rem; padding: 1rem 2rem; font-size: 1.8rem;">
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </section>


    <!-- Scripts -->
    <script src="../js/jquery-3.3.1.js"></script>
    <script src="../js/bootstrap.min.js"></script>
